# Directory containing per-chromosome transgene FASTA files (chr*.fa)
rootdir: /path/to/transgenes/

# Output path for the generated transgene GTF
trans_gtf: /path/to/trans.gtf

# Transgene locus definitions
# Each entry produces CDS, transcript, and exon GTF records
loci:
  MyGene:
    chrom: chrTrans       # chromosome name (must match FASTA header)
    fa: chrTrans.fa       # FASTA filename within rootdir
    start: 1
    end: 500
    strand: "+"
